<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏠 Dynamic MTF Portfolio Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --green: #10b981;
            --red: #ef4444;
            --border: #334155;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        .header h1 { margin: 0; font-size: 24px; }
        .timestamp { color: var(--text-muted); font-size: 14px; }
        
        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .card-title { font-size: 12px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
        .card-value { font-size: 20px; font-weight: bold; }
        
        /* Tables */
        .section-title { font-size: 18px; margin: 25px 0 10px 0; color: var(--text-muted); }
        .table-responsive { overflow-x: auto; background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th, td { padding: 12px 15px; border-bottom: 1px solid var(--border); }
        th { background: #111827; color: var(--text-muted); font-weight: 600; }
        tr:hover { background: #24334d; }
        
        .pos-value { color: var(--green); }
        .neg-value { color: var(--red); }
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge-mtf { background: #3b82f6; color: white; }
        .badge-delivery { background: #64748b; color: white; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header">
        <h1>🏠 MTF PORTFOLIO DASHBOARD</h1>
        <div class="timestamp" id="live-status">Live Status: Loading Data...</div>
    </div>

    <div class="summary-grid">
        <div class="card">
            <div class="card-title">💰 Opening Capital</div>
            <div class="card-value" id="open-capital">₹0</div>
        </div>
        <div class="card">
            <div class="card-title">📂 Open Positions</div>
            <div class="card-value" id="open-count">0 Stocks</div>
        </div>
        <div class="card">
            <div class="card-title">✅ Closed Trades</div>
            <div class="card-value" id="closed-count">0 Trades</div>
        </div>
        <div class="card">
            <div class="card-title">📈 Total Net P&L</div>
            <div class="card-value" id="net-pl">₹0</div>
        </div>
    </div>

    <div class="section-title">📂 SECTION 1 — OPEN POSITIONS ANALYSIS</div>
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>STOCK</th>
                    <th>BUY DATE</th>
                    <th>QTY</th>
                    <th>BUY PRICE</th>
                    <th>TOTAL BUY VALUE</th>
                    <th>CMP</th>
                    <th>CURRENT VALUE</th>
                    <th>UNREALISED P&L</th>
                    <th>TYPE</th>
                </tr>
            </thead>
            <tbody id="open-positions-table">
                </tbody>
        </table>
    </div>
</div>

<script>
    // 1. THIS IS YOUR DATA STORE. 
    // In production, you can change this setup to fetch directly from a Google Sheet CSV export.
    const portfolioData = {
        openingCapital: 8000000,
        lastUpdated: new Date().toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }),
        openPositions: [
            { stock: "M&M", buyDate: "2026-06-25", qty: 500, buyPrice: 3164, cmp: 3138, type: "MTF" },
            { stock: "THELEELA", buyDate: "2026-06-25", qty: 500, buyPrice: 484, cmp: 481, type: "Delivery" },
            { stock: "MOTHERSON", buyDate: "2026-06-25", qty: 5000, buyPrice: 152, cmp: 146.7, type: "MTF" },
            { stock: "OLAELEC", buyDate: "2026-06-24", qty: 10000, buyPrice: 43, cmp: 44.4, type: "Delivery" }
        ],
        closedTradesCount: 36,
        realizedNetPL: 992223
    };

    // 2. RENDER ENGINE: Calculates values mathematically and generates the UI elements dynamically
    function renderDashboard(data) {
        // Update top cards
        document.getElementById('live-status').innerText = `Live Status: As of ${data.lastUpdated}`;
        document.getElementById('open-capital').innerText = `₹${data.openingCapital.toLocaleString('en-IN')}`;
        document.getElementById('open-count').innerText = `${data.openPositions.length} Stocks`;
        document.getElementById('closed-count').innerText = `${data.closedTradesCount} Trades`;
        document.getElementById('net-pl').innerText = `₹${data.realizedNetPL.toLocaleString('en-IN')}`;

        const openTableBody = document.getElementById('open-positions-table');
        openTableBody.innerHTML = ""; // Clear loader

        // Populate and calculate Open Positions Row Items
        data.openPositions.forEach(pos => {
            const totalBuyValue = pos.qty * pos.buyPrice;
            const currentValue = pos.qty * pos.cmp;
            const unrealizedPL = currentValue - totalBuyValue;
            const plClass = unrealizedPL >= 0 ? 'pos-value' : 'neg-value';
            const plSign = unrealizedPL >= 0 ? '+' : '';

            const row = `
                <tr>
                    <td><b>${pos.stock}</b></td>
                    <td>${pos.buyDate}</td>
                    <td>${pos.qty.toLocaleString('en-IN')}</td>
                    <td>₹${pos.buyPrice.toLocaleString('en-IN')}</td>
                    <td>₹${totalBuyValue.toLocaleString('en-IN')}</td>
                    <td>₹${pos.cmp.toLocaleString('en-IN')}</td>
                    <td>₹${currentValue.toLocaleString('en-IN')}</td>
                    <td class="${plClass}">${plSign}₹${unrealizedPL.toLocaleString('en-IN')}</td>
                    <td><span class="badge badge-${pos.type.toLowerCase()}">${pos.type}</span></td>
                </tr>
            `;
            openTableBody.innerHTML += row;
        });
    }

    // Initialize Dashboard rendering process
    window.onload = () => {
        renderDashboard(portfolioData);
    };
</script>
</body>
</html>
