<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🏠 MTF Portfolio Dashboard</title>
    <style>
        :root { --bg-color: #f8fafc; --text-primary: #1e293b; --green-profit: #15803d; --red-loss: #b91c1c; }
        body { background-color: var(--bg-color); color: var(--text-primary); padding: 24px; font-family: sans-serif; }
        .dashboard-container { max-width: 1600px; margin: 0 auto; }
        .collapsible-wrapper { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
        .collapsible-header { background: #f1f5f9; padding: 16px 24px; cursor: pointer; display: flex; justify-content: space-between; font-weight: 600; }
        .collapsible-content { padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #f8fafc; padding: 12px; border-bottom: 2px solid #e2e8f0; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
        .profit { color: var(--green-profit); font-weight: 600; }
        .loss { color: var(--red-loss); font-weight: 600; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="collapsible-wrapper">
            <div class="collapsible-header">📂 OPEN POSITIONS</div>
            <div class="collapsible-content">
                <table>
                    <thead>
                        <tr><th>#</th><th>Stock</th><th>Buy Date</th><th>Qty</th><th>Buy Price</th><th>Current P&L</th></tr>
                    </thead>
                    <tbody id="open-positions-body">
                        <tr><td colspan="6">Loading data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = 'https://script.google.com/macros/s/AKfycbzPQ-gBY47EaBv8hgwbZrKObWX9xhWq2MafJH_bxdb3DtLAH33ap5ZhmZJMXWCs07FP/exec';

        async function refreshDashboard() {
            try {
                const response = await fetch(BASE_URL + '?mode=data');
                const json = await response.json();
                const data = json.dashboard; 
                
                const tableBody = document.getElementById('open-positions-body');
                tableBody.innerHTML = ''; 
                
                // Starting at row 10 (index 9) based on your data structure
                for (let i = 9; i < data.length; i++) {
                    let row = data[i];
                    if (row[1] && row[1] !== "Stock" && row[1] !== "TOTAL") {
                        tableBody.innerHTML += `<tr>
                            <td>${row[1]}</td><td><b>${row[2]}</b></td><td>${row[3]}</td>
                            <td>${row[4]}</td><td>${row[5]}</td>
                            <td class="${row[10] < 0 ? 'loss' : 'profit'}">${row[10]}</td>
                        </tr>`;
                    }
                }
            } catch (err) { console.error("Error:", err); }
        }
        refreshDashboard();
    </script>
</body>
</html>
